          description: Nudge sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      sent:
                        type: boolean
                      message:
                        type: string
        '400':
          description: Cannot nudge (already confirmed, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ━━━ Recurring ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  /recurring:
    get:
      tags: [Recurring]
      summary: List recurring expenses for the current user
      operationId: getRecurringExpenses
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Recurring expenses
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Expense'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ━━━ Household ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  /household/{groupId}/summary:
    get:
      tags: [Household]
      summary: Get household expense summary for a group
      operationId: getHouseholdSummary
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - name: month
          in: query
          description: "Month filter (e.g. '2024-03')"
          schema:
            type: string
            example: '2024-03'
      responses:
        '200':
          description: Household summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    description: Household expense breakdown for the group/month
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
