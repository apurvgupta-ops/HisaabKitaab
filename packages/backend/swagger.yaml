        '404':
          $ref: '#/components/responses/NotFound'

  /groups/{id}/members:
    post:
      tags: [Groups]
      summary: Add a member to a group by email (admin only)
      operationId: addMember
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '200':
          description: Member added or invite sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
