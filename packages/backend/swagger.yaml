openapi: 3.0.3
info:
  title: Splitwise API
  description: |
    A full-featured expense-splitting and personal finance API.
    Supports group expense management, settlements, personal transactions,
    budgets, AI-powered categorization, file uploads, reports, and more.

    ## Authentication
    Most endpoints require a **Bearer JWT** token in the `Authorization` header.
    Obtain tokens via `/auth/register` or `/auth/login`. Access tokens expire in 15 minutes;
    use `/auth/refresh` with your refresh token to obtain a new pair.

    ## Rate Limiting
    - **Global:** All `/api/*` routes are rate-limited (configurable window/max).
    - **Auth:** Register and login are additionally limited to 20 requests per 15 minutes.

    ## Response Format
    - **Success:** `{ "success": true, "data": ... }`
    - **Paginated:** `{ "success": true, "data": [...], "pagination": { ... } }`
    - **Error:** `{ "success": false, "error": { "code": "...", "message": "...", "details": { ... } } }`
  version: 1.0.0
  contact:
    name: Splitwise API
  license:
    name: MIT

servers:
  - url: /api/v1
    description: API v1 (primary)
  - url: /api
    description: API (alias, same router)

tags:
  - name: Health
    description: Health check
  - name: Auth
    description: Authentication & registration
  - name: Users
    description: User profile management
  - name: Groups
    description: Group CRUD & member management
  - name: Expenses
    description: Group expense management
  - name: Settlements
    description: Debt settlements between users
  - name: Transactions
    description: Personal income/expense tracking
  - name: Budgets
    description: Budget management & alerts
  - name: Categories
    description: Expense/transaction categories
  - name: AI
    description: AI-powered features
  - name: Uploads
    description: File uploads (S3)
  - name: Reports
    description: CSV exports & financial reports
  - name: Features
    description: Feature flags
  - name: Reminders
    description: Debt reminders & nudges
  - name: Recurring
    description: Recurring expenses
  - name: Household
    description: Household expense summaries

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token obtained from /auth/login or /auth/register

  schemas:
    # ─── Common ────────────────────────────────────────
    SuccessMessage:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [message]
          properties:
            message:
              type: string

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages, hasNext, hasPrev]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3
        hasNext:
          type: boolean
        hasPrev:
          type: boolean

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
              example: Validation failed
            details:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      example:
        success: false
        error:
          code: VALIDATION_ERROR
          message: Validation failed
          details:
            email: ["Invalid email address"]

    # ─── Auth ──────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, and a digit
          example: MyP@ss1word
        inviteToken:
          type: string
          format: uuid
          description: Optional group invite token to auto-join on registration

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 1
          example: MyP@ss1word

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1

    AuthTokens:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token lifetime in seconds
          example: 900

    AuthResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [user, tokens]
          properties:
            user:
              $ref: '#/components/schemas/UserSummaryFull'
            tokens:
              $ref: '#/components/schemas/AuthTokens'

    RefreshResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [tokens]
          properties:
            tokens:
              $ref: '#/components/schemas/AuthTokens'

    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetConfirm:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, and a digit

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    InviteDetails:
      type: object
      properties:
        token:
          type: string
        email:
          type: string
        role:
          type: string
        group:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        expiresAt:
          type: string
          format: date-time

    # ─── User ──────────────────────────────────────────
    UserSummaryFull:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatar:
          type: string
          nullable: true
        preferredCurrency:
          type: string
          example: USD

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatar:
          type: string
          nullable: true
        preferredCurrency:
          type: string
        preferences:
          $ref: '#/components/schemas/UserPreferences'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, system]
        language:
          type: string
        notifications:
          $ref: '#/components/schemas/NotificationPreferences'
        defaultSplitType:
          type: string
          enum: [equal, percentage, exact, shares]

    NotificationPreferences:
      type: object
      properties:
        email:
          type: boolean
        push:
          type: boolean
        sms:
          type: boolean
        expenseAdded:
          type: boolean
        settlementReceived:
          type: boolean
        budgetAlert:
          type: boolean
        weeklyReport:
          type: boolean

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        avatar:
          type: string
          format: uri
          nullable: true
        preferredCurrency:
          type: string
          minLength: 3
          maxLength: 3
          description: 3-letter ISO currency code
          example: USD

    UpdatePreferencesRequest:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, system]
        language:
          type: string
          minLength: 2
          maxLength: 5
        notifications:
          $ref: '#/components/schemas/NotificationPreferences'
        defaultSplitType:
          type: string
          enum: [equal, percentage, exact, shares]

    # ─── Group ─────────────────────────────────────────
    GroupSettings:
      type: object
      properties:
        simplifyDebts:
          type: boolean
        defaultSplitType:
          type: string
          enum: [equal, percentage, exact, shares]
        allowSettlements:
          type: boolean

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Trip to Paris
        type:
          type: string
          enum: [trip, home, couple, project, other]
          default: other
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
        settings:
          $ref: '#/components/schemas/GroupSettings'

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          type: string
          enum: [trip, home, couple, project, other]
        currency:
          type: string
          minLength: 3
          maxLength: 3
        settings:
          $ref: '#/components/schemas/GroupSettings'

    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [trip, home, couple, project, other]
        currency:
          type: string
        settings:
          $ref: '#/components/schemas/GroupSettings'
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GroupMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, member]
        joinedAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserSummaryFull'

    GroupWithMembers:
      allOf:
        - $ref: '#/components/schemas/Group'
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/GroupMember'

    AddMemberRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member]
          default: member

    UpdateMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, member]

    GroupBalance:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        userName:
          type: string
        balance:
          type: number

    DebtEdge:
      type: object
      properties:
        from:
          type: string
          format: uuid
        fromName:
          type: string
        to:
          type: string
          format: uuid
        toName:
          type: string
        amount:
          type: number

    GroupBalanceSummary:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        balances:
          type: array
          items:
            $ref: '#/components/schemas/GroupBalance'
        simplifiedDebts:
          type: array
          items:
            $ref: '#/components/schemas/DebtEdge'
        totalExpenses:
          type: number

    # ─── Expense ───────────────────────────────────────
    Payer:
      type: object
      required: [userId, amount]
      properties:
        userId:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01

    Split:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
        percentage:
          type: number
          minimum: 0
          maximum: 100
        shares:
          type: integer
          minimum: 1

    RecurringConfig:
      type: object
      required: [frequency, interval]
      properties:
        frequency:
          type: string
          enum: [daily, weekly, monthly, yearly]
        interval:
          type: integer
          minimum: 1
          maximum: 365
        endDate:
          type: string
          format: date-time
          nullable: true

    CreateExpenseRequest:
      type: object
      required: [groupId, amount, description, splitType, payers, splits]
      properties:
        groupId:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
          example: 120.50
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
        description:
          type: string
          minLength: 1
          maxLength: 500
          example: Dinner at restaurant
        splitType:
          type: string
          enum: [equal, percentage, exact, shares]
        categoryId:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 10
        date:
          type: string
          format: date-time
        payers:
          type: array
          items:
            $ref: '#/components/schemas/Payer'
          minItems: 1
          description: Payer amounts must sum to the expense amount
        splits:
          type: array
          items:
            $ref: '#/components/schemas/Split'
          minItems: 1
        isRecurring:
          type: boolean
          default: false
        recurringConfig:
          $ref: '#/components/schemas/RecurringConfig'

    UpdateExpenseRequest:
      type: object
      properties:
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
        description:
          type: string
          minLength: 1
          maxLength: 500
        splitType:
          type: string
          enum: [equal, percentage, exact, shares]
        categoryId:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 10
        date:
          type: string
          format: date-time
        payers:
          type: array
          items:
            $ref: '#/components/schemas/Payer'
          minItems: 1
        splits:
          type: array
          items:
            $ref: '#/components/schemas/Split'
          minItems: 1

    ExpenseAttachment:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        filename:
          type: string
        mimeType:
          type: string
        size:
          type: integer

    ExpensePayer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expenseId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        amount:
          type: number
        user:
          $ref: '#/components/schemas/UserSummaryFull'

    ExpenseSplit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expenseId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        amount:
          type: number
        percentage:
          type: number
          nullable: true
        shares:
          type: integer
          nullable: true
        user:
          $ref: '#/components/schemas/UserSummaryFull'

    CategorySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        color:
          type: string

    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        amount:
          type: number
        currency:
          type: string
        amountInBase:
          type: number
        description:
          type: string
        splitType:
          type: string
          enum: [equal, percentage, exact, shares]
        categoryId:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseAttachment'
        isRecurring:
          type: boolean
        recurringConfig:
          $ref: '#/components/schemas/RecurringConfig'
        createdBy:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        payers:
          type: array
          items:
            $ref: '#/components/schemas/ExpensePayer'
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplit'
        category:
          $ref: '#/components/schemas/CategorySummary'
        creator:
          $ref: '#/components/schemas/UserSummaryFull'

    # ─── Settlement ────────────────────────────────────
    CreateSettlementRequest:
      type: object
      required: [groupId, toUserId, amount]
      properties:
        groupId:
          type: string
          format: uuid
        toUserId:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
        paymentMethod:
          type: string
          enum: [cash, bank_transfer, upi, stripe, razorpay, other]
          nullable: true
        note:
          type: string
          maxLength: 500
          nullable: true

    UpdateSettlementStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [confirmed, rejected]

    Settlement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        fromUserId:
          type: string
          format: uuid
        toUserId:
          type: string
          format: uuid
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [pending, confirmed, rejected]
        paymentMethod:
          type: string
          nullable: true
        paymentDetails:
          type: object
          nullable: true
        note:
          type: string
          nullable: true
        settledAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SettlementWithUsers:
      allOf:
        - $ref: '#/components/schemas/Settlement'
        - type: object
          properties:
            fromUser:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                avatar:
                  type: string
                  nullable: true
            toUser:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                avatar:
                  type: string
                  nullable: true

    # ─── Transaction ───────────────────────────────────
    CreateTransactionRequest:
      type: object
      required: [type, amount, description, account]
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
        description:
          type: string
          minLength: 1
          maxLength: 500
        categoryId:
          type: string
          format: uuid
          nullable: true
        account:
          type: string
          minLength: 1
          maxLength: 100
          example: Checking Account
        date:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    UpdateTransactionRequest:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
        description:
          type: string
          minLength: 1
          maxLength: 500
        categoryId:
          type: string
          format: uuid
          nullable: true
        account:
          type: string
          minLength: 1
          maxLength: 100
        date:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        currency:
          type: string
        description:
          type: string
        categoryId:
          type: string
          format: uuid
          nullable: true
        account:
          type: string
        metadata:
          type: object
        date:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CategoryBreakdown:
      type: object
      properties:
        categoryId:
          type: string
        categoryName:
          type: string
        total:
          type: number
        count:
          type: integer
        percentage:
          type: number

    AccountBreakdown:
      type: object
      properties:
        account:
          type: string
        balance:
          type: number
        income:
          type: number
        expenses:
          type: number

    TransactionSummary:
      type: object
      properties:
        totalIncome:
          type: number
        totalExpenses:
          type: number
        netBalance:
          type: number
        byCategory:
          type: array
          items:
            $ref: '#/components/schemas/CategoryBreakdown'
        byAccount:
          type: array
          items:
            $ref: '#/components/schemas/AccountBreakdown'

    # ─── Budget ────────────────────────────────────────
    CreateBudgetRequest:
      type: object
      required: [limitAmount, period]
      properties:
        categoryId:
          type: string
          format: uuid
          nullable: true
        limitAmount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
        period:
          type: string
          enum: [weekly, monthly, yearly]
        alertThreshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.8
          description: Fraction (0-1) at which to trigger an alert
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true

    UpdateBudgetRequest:
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
          nullable: true
        limitAmount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
        period:
          type: string
          enum: [weekly, monthly, yearly]
        alertThreshold:
          type: number
          minimum: 0
          maximum: 1
        endDate:
          type: string
          format: date-time
          nullable: true

    Budget:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
          nullable: true
        limitAmount:
          type: number
        period:
          type: string
          enum: [weekly, monthly, yearly]
        alertThreshold:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BudgetWithProgress:
      allOf:
        - $ref: '#/components/schemas/Budget'
        - type: object
          properties:
            spent:
              type: number
            remaining:
              type: number
            percentage:
              type: number
            isOverBudget:
              type: boolean
            categoryName:
              type: string
              nullable: true
            categoryIcon:
              type: string
              nullable: true

    BudgetAlert:
      type: object
      properties:
        budgetId:
          type: string
          format: uuid
        categoryName:
          type: string
        limitAmount:
          type: number
        spent:
          type: number
        percentage:
          type: number
        message:
          type: string

    # ─── Category ──────────────────────────────────────
    CreateCategoryRequest:
      type: object
      required: [name, icon, color]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: Food & Dining
        icon:
          type: string
          minLength: 1
          maxLength: 50
          example: utensils
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          example: '#FF6B6B'
        parentId:
          type: string
          format: uuid
          nullable: true

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        icon:
          type: string
          minLength: 1
          maxLength: 50
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        userId:
          type: string
          format: uuid
          nullable: true
        isSystem:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ─── AI ────────────────────────────────────────────
    CategorizeRequest:
      type: object
      required: [description, amount]
      properties:
        description:
          type: string
          example: Uber ride to airport
        amount:
          type: number
          example: 25.50
        currency:
          type: string
          example: USD

    ParseExpenseRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          example: I paid $50 for dinner with Alice and Bob last Friday

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: How much did I spend on food this month?
        history:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                example: user
              content:
                type: string

    # ─── Upload ────────────────────────────────────────
    UploadResult:
      type: object
      properties:
        key:
          type: string
        url:
          type: string
          format: uri
        filename:
          type: string
        mimeType:
          type: string
        size:
          type: integer

    ReceiptUploadResult:
      type: object
      properties:
        upload:
          type: object
          properties:
            filename:
              type: string
            mimeType:
              type: string
            size:
              type: integer
        receipt:
          type: object
          description: AI-parsed receipt data

    # ─── Feature Flags ─────────────────────────────────
    FeatureFlags:
      type: object
      additionalProperties:
        type: boolean
      example:
        darkMode: true
        aiChat: false

  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    StartDate:
      name: startDate
      in: query
      schema:
        type: string
        format: date-time
    EndDate:
      name: endDate
      in: query
      schema:
        type: string
        format: date-time

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Unauthorized
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  # ━━━ Health ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  /health:
    servers:
      - url: /
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  # ━━━ Auth ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      operationId: logout
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Request a password reset email
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Reset email sent (always returns 200 to prevent enumeration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirm password reset with token
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/invites/{token}:
    get:
      tags: [Auth]
      summary: Get group invite details
      operationId: getInviteDetails
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/InviteDetails'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/google:
    get:
      tags: [Auth]
      summary: Initiate Google OAuth (not implemented)
      operationId: googleAuth
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback (not implemented)
      operationId: googleAuthCallback
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ━━━ Users ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
