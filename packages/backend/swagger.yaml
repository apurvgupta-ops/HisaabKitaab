      operationId: createExpense
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Expense'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /expenses/group/{groupId}:
    get:
      tags: [Expenses]
      summary: List expenses for a group (paginated, filterable)
      operationId: getGroupExpenses
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - name: minAmount
          in: query
          schema:
            type: number
            minimum: 0
        - name: maxAmount
          in: query
          schema:
            type: number
            minimum: 0
        - name: search
          in: query
          schema:
            type: string
            maxLength: 200
        - name: splitType
          in: query
          schema:
            type: string
            enum: [equal, percentage, exact, shares]
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [date, amount, createdAt]
            default: date
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated expense list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Expense'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /expenses/group/{groupId}/balances:
    get:
      tags: [Expenses]
      summary: Get group balances
      operationId: getGroupBalances
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Group balance summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/GroupBalanceSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /expenses/{id}:
    get:
      tags: [Expenses]
      summary: Get an expense by ID
      operationId: getExpense
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Expense details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Expense'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Expenses]
      summary: Update an expense
      operationId: updateExpense
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseRequest'
      responses:
        '200':
          description: Updated expense
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Expense'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Expenses]
      summary: Delete an expense
      operationId: deleteExpense
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          description: Expense deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ━━━ Settlements ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  /settlements:
    post:
      tags: [Settlements]
      summary: Create a new settlement
      operationId: createSettlement
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSettlementRequest'
      responses:
        '201':
          description: Settlement created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SettlementWithUsers'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /settlements/group/{groupId}:
    get:
      tags: [Settlements]
      summary: List settlements for a group
      operationId: getGroupSettlements
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Group settlements
          content:
            application/json:
              schema:
